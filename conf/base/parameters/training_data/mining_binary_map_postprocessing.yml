mining_binary_map_postprocessing:
  classification_map: data/07_model_output/mining_binary_classification_map.tif
  class_label: Mineria
  negative_label: No Mineria
  class_value: 1
  negative_value: 0
  class_nodata: 255
  min_area_ha: 1.0
  connectivity: 8
  all_touched: false
  outputs:
    postprocessed_classification_map: data/07_model_output/mining_binary_classification_map_postprocessed.tif
    polygons: data/07_model_output/mining_binary_polygons.geojson
    polygon_layer: mining_binary_polygons
    polygon_summary_csv: data/07_model_output/mining_binary_polygons.csv
  map:
    output_path: data/08_reporting/mining_binary_postprocessed_map.png
    title: Mapa postprocesado de mineria
    figure_size: [9, 9]
    dpi: 180
    mining_color: "#E31A1C"
    no_mining_color: "#1A9850"
    title_font_size: 15
    note_font_size: 8
    x_label: Este (m)
    y_label: Norte (m)
    legend_location: upper left
    grid:
      enabled: true
      color: "#303030"
      alpha: 0.35
      linewidth: 0.6
    north_arrow:
      enabled: true
      x: 0.93
      y: 0.88
      font_size: 13
    scale_bar:
      enabled: true
      fraction: 0.2
      x_fraction: 0.08
      y_fraction: 0.07
      font_size: 10
    layout:
      left: 0.11
      right: 0.97
      bottom: 0.12
      top: 0.92
