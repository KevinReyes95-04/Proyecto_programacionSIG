sentinel2_download:
  collection: COPERNICUS/S2_SR_HARMONIZED
  roi:
    # Options: bbox, inline_geojson, geojson_path.
    # Use bbox for simple rectangular areas fully defined in parameters.
    name: roi_planet_quick_search_polygon
    source: inline_geojson
    bbox: null
    # Use inline_geojson for polygons fully defined in parameters.
    inline_geojson:
      type: Polygon
      coordinates:
        - - [-74.96723392, 7.79418315]
          - [-74.96709889, 8.12991298]
          - [-74.62519767, 8.12977610]
          - [-74.62532856, 7.79405091]
          - [-74.96723392, 7.79418315]
    # Use geojson_path when the ROI lives in an external .geojson/.json file.
    geojson_path: null
  # The ROI crosses several Sentinel-2 MGRS tiles. This one-day window has
  # all four tiles available with <=10% cloud cover.
  start_date: "2023-02-02"
  end_date: "2023-02-03"
  cloud_cover_max: 10
  cloud_cover_property: CLOUDY_PIXEL_PERCENTAGE
  cloud_mask: true
  cloud_mask_method: qa60
  cloud_mask_scl_classes:
    - 3   # cloud shadows
    - 8   # cloud medium probability
    - 9   # cloud high probability
    - 10  # thin cirrus
  composite_method: median
  sort_by: system:time_start
  sort_ascending: true
  bands:
    - B1
    - B2
    - B3
    - B4
    - B5
    - B6
    - B7
    - B8
    - B8A
    - B9
    - B11
    - B12
  scale: 10
  crs: null
  drive_export:
    folder: centromonitoreo_mineria
    file_name_prefix: Sentinel2
    description: Sentinel2
    file_format: GeoTIFF
    align_to_reference_band: true
    reference_band: B2
    max_pixels: 10000000000
    wait_for_completion: true
    poll_interval_seconds: 30
    timeout_seconds: 7200
  local_download:
    enabled: true
    output_dir: data/04_feature/sentinel2_bands
    file_name_template: "{file_name_prefix}_{band}_Masked.tif"
    target_crs: EPSG:9377
    resampling: bilinear
    timeout_seconds: 300
  apply_reflectance_scale: false
  reflectance_scale_factor: 0.0001
